    <p>BYOC stands for Bring Your Own Container.
        In the Kantina ISM do not serve single use containers and support students who bring their own lunch box or water bottle.

14% of all litter is from single use beverage containers.
</p>
    <div id="chat-output"></div>
<input type="text" id="chatInput">
<button onclick="sendMessage()">send</button>

<script>
    async function sendMessage() {
        let msg = document.getElementById('chatInput').value;
        document.getElementById('chatInput').value = '';
        document.getElementById('chat-output').innerHTML += '<br>' + msg;

        let response = await fetch('/api/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: msg })
        });

        let data = await response.json();
        document.getElementById('chat-output').innerHTML += '<br>' + data.reply;
    }
</script>
